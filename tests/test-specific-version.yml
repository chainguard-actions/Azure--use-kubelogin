name: Test specific kubelogin version
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          kubelogin-version: 'v0.0.28'
          skip-cache: 'true'
      - name: Assert kubelogin is installed at specified version
        run: |
          which kubelogin || (echo "FAIL: kubelogin not found in PATH" && exit 1)
          VERSION=$(kubelogin --version 2>&1 || true)
          echo "kubelogin version output: $VERSION"
          echo "PASS: kubelogin installed successfully"
