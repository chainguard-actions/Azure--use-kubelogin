name: Test basic usage with kubelogin-version
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          kubelogin-version: 'v0.1.3'
      - name: Assert kubelogin is installed
        run: |
          which kubelogin || (echo "FAIL: kubelogin not found in PATH" && exit 1)
          kubelogin --version
          echo "PASS: kubelogin is installed"
